fr_logo_url:
  type: string
  default: "https://firstresponsegame.com/logo.png"
  description: "URL for the forum header logo. Leave empty to use the logo uploaded in Discourse admin."

fr_enable_atmospheric_bg:
  type: bool
  default: true
  description: "Enable the subtle blue/red atmospheric gradient background."

fr_dev_badges_enabled:
  type: bool
  default: true
  description: "Show LEAD DEV / DEV badges next to developer usernames in posts."
